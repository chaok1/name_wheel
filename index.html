<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>5-Row Name Slot Machine (Anti-Duplicate)</title>
  <style>
    :root {
      --primary-color: #ff4757;
      --secondary-color: #2f3542;
      --accent-color: #ffa502;
      --bg-color: #1e222b;
      --card-bg: #2f3542;
      --text-color: #ffffff;
      --item-height: 80px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 650px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent-color);
      text-shadow: 0 0 12px rgba(255, 165, 2, 0.5);
    }

    .slot-machine {
      background: linear-gradient(145px, #3a4150, #232832);
      border: 10px solid #111;
      border-radius: 24px;
      padding: 35px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.6), 
                  inset 0 0 25px rgba(255,255,255,0.1);
      margin-bottom: 30px;
      position: relative;
    }

    .slot-viewport {
      height: calc(var(--item-height) * 5); 
      background-color: #0f1115;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 25px 30px rgba(0,0,0,0.95),
                  inset 0 -25px 30px rgba(0,0,0,0.95);
      border: 4px solid #111;
    }

    .slot-viewport::before, .slot-viewport::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--primary-color), transparent);
      z-index: 5;
    }
    .slot-viewport::before { top: calc(var(--item-height) * 2); } 
    .slot-viewport::after { top: calc(var(--item-height) * 3); }  

    .viewport-shade {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 100%;
      background: linear-gradient(to bottom, 
                    rgba(15,17,21,0.85) 0%, 
                    rgba(15,17,21,0.4) 25%,
                    transparent 40%, 
                    transparent 60%, 
                    rgba(15,17,21,0.4) 75%,
                    rgba(15,17,21,0.85) 100%);
      pointer-events: none;
      z-index: 3;
    }

    .slot-reel {
      display: flex;
      flex-direction: column;
      transform: translateY(0);
    }

    .slot-item {
      height: var(--item-height);
      line-height: var(--item-height);
      font-size: 2rem;
      font-weight: bold;
      color: #616a78; 
      text-transform: uppercase;
      letter-spacing: 1.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 20px;
      transition: color 0.3s ease, transform 0.3s ease, font-size 0.3s ease;
    }

    .slot-item.winner {
      color: var(--accent-color);
      font-size: 2.6rem;
      text-shadow: 0 0 20px rgba(255, 165, 2, 0.8);
      transform: scale(1.05);
    }

    .spin-btn {
      background: linear-gradient(to bottom, #ff6b81, #ff4757);
      border: none;
      border-radius: 50px;
      color: white;
      font-size: 1.6rem;
      font-weight: bold;
      padding: 18px 45px;
      cursor: pointer;
      margin-top: 25px;
      box-shadow: 0 6px 0 #b33939, 0 10px 20px rgba(0,0,0,0.4);
      transition: all 0.1s ease;
      width: 100%;
      letter-spacing: 1.5px;
    }

    .spin-btn:hover {
      background: linear-gradient(to bottom, #ff7f93, #ff5263);
    }

    .spin-btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #b33939, 0 4px 12px rgba(0,0,0,0.4);
    }

    .spin-btn:disabled {
      background: #57606f;
      box-shadow: none;
      cursor: not-allowed;
      transform: translateY(5px);
    }

    .settings-panel {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      margin-top: 10px;
    }

    .settings-panel summary {
      cursor: pointer;
      font-weight: 600;
      color: #a4b0be;
      outline: none;
    }

    textarea {
      width: 100%;
      height: 150px;
      background-color: #1e222b;
      border: 2px solid #57606f;
      border-radius: 8px;
      color: #fff;
      padding: 10px;
      margin-top: 15px;
      resize: vertical;
      font-size: 1rem;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>NAME ROULETTE</h1>

  <div class="slot-machine">
    <div class="slot-viewport">
      <div class="viewport-shade"></div>
      <div class="slot-reel" id="slotReel">
        <div class="slot-item">READY</div>
        <div class="slot-item">READY</div>
        <div class="slot-item winner">SPIN!</div>
        <div class="slot-item">READY</div>
        <div class="slot-item">READY</div>
      </div>
    </div>
    
    <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN!</button>
  </div>

  <details class="settings-panel">
    <summary>Edit Names List</summary>
    <textarea id="namesInput">Kelsey
Sean
Indrayani
Francis
David
Coleman
Pierce
Ramesh
Philip
Justin
Chloe
Roman
Tai
Isabel
Monica
Hannah
Aya
Jake
Jing Wen
Mark
Raciel
Ella
Kenneth
Jaquelyn
Sammy
JohnJack
Danny
Laura
Cameron
JohnPaul
Valerie
Alex
Ananya</textarea>
  </details>
</div>

<script>
  const slotReel = document.getElementById('slotReel');
  const spinBtn = document.getElementById('spinBtn');
  const namesInput = document.getElementById('namesInput');
  const itemHeight = 80; 

  function getNames() {
    return namesInput.value
      .split('\n')
      .map(name => name.trim())
      .filter(name => name.length > 0);
  }

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function spin() {
    const names = getNames();
    
    if (names.length < 3) {
      alert("Please enter at least 3 names to run cleanly!");
      return;
    }

    spinBtn.disabled = true;

    slotReel.style.transition = 'none';
    slotReel.style.transform = 'translateY(0)';
    slotReel.offsetHeight; 

    const block1 = shuffle([...names]);
    const block2 = shuffle([...names]);
    const block3 = shuffle([...names]);
    
    const finalWinnerIndex = Math.floor(Math.random() * names.length);
    const targetWinner = names[finalWinnerIndex];

    // --- ANTI-DUPLICATE SHIELD LOGIC ---
    // Row 1 & 2 read from the tail end of block3. If the winner is there, swap it away.
    if (block3[block3.length - 1] === targetWinner) {
      [block3[block3.length - 1], block3[0]] = [block3[0], block3[block3.length - 1]];
    }
    if (block3[block3.length - 2] === targetWinner) {
      [block3[block3.length - 2], block3[1]] = [block3[1], block3[block3.length - 2]];
    }

    const remainingShuffled = shuffle([...names]);
    // Row 4 & 5 read from the start of remainingShuffled. If the winner is there, swap it away.
    if (remainingShuffled[0] === targetWinner) {
      [remainingShuffled[0], remainingShuffled[remainingShuffled.length - 1]] = [remainingShuffled[remainingShuffled.length - 1], remainingShuffled[0]];
    }
    if (remainingShuffled[1] === targetWinner) {
      [remainingShuffled[1], remainingShuffled[remainingShuffled.length - 2]] = [remainingShuffled[remainingShuffled.length - 2], remainingShuffled[1]];
    }
    // ------------------------------------

    const reelItems = ['🎰 ROLLING 🎰', '🎲 SPINNING 🎲', ...block1, ...block2, ...block3];
    const winnerPositionInReel = reelItems.length;
    reelItems.push(targetWinner);
    reelItems.push(...remainingShuffled);

    slotReel.innerHTML = reelItems
      .map(name => `<div class="slot-item">${name}</div>`)
      .join('');

    const transitionDuration = 4.2; 
    slotReel.style.transition = `transform ${transitionDuration}s cubic-bezier(0.08, 0.85, 0.2, 1)`;
    
    const targetOffset = (winnerPositionInReel - 2) * itemHeight;
    slotReel.style.transform = `translateY(-${targetOffset}px)`;

    setTimeout(() => {
      const items = slotReel.querySelectorAll('.slot-item');
      const winnerElement = items[winnerPositionInReel];
      if (winnerElement) {
        winnerElement.classList.add('winner');
      }
      spinBtn.disabled = false;
    }, transitionDuration * 1000);
  }
</script>

</body>
</html>
