<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Name Slot Machine Picker</title>
  <style>
    :root {
      --primary-color: #ff4757;
      --secondary-color: #2f3542;
      --accent-color: #ffa502;
      --bg-color: #1e222b;
      --card-bg: #2f3542;
      --text-color: #ffffff;
      --slot-height: 90px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent-color);
      text-shadow: 0 0 10px rgba(255, 165, 2, 0.5);
    }

    /* Slot Machine Frame */
    .slot-machine {
      background: linear-gradient(145px, #3a4150, #232832);
      border: 8px solid #111;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), 
                  inset 0 0 20px rgba(255,255,255,0.1);
      margin-bottom: 30px;
      position: relative;
    }

    /* The Viewport Window */
    .slot-viewport {
      height: var(--slot-height);
      background-color: #0f1115;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 10px 20px rgba(0,0,0,0.8),
                  inset 0 -10px 20px rgba(0,0,0,0.8);
      border: 3px solid #111;
    }

    /* Target overlay lines to mimic real slot machines */
    .slot-viewport::before, .slot-viewport::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background-color: rgba(255, 71, 87, 0.4);
      z-index: 2;
    }
    .slot-viewport::before { top: 15px; }
    .slot-viewport::after { bottom: 15px; }

    /* The Moving Reel */
    .slot-reel {
      display: flex;
      flex-direction: column;
      transform: translateY(0);
    }

    /* Individual Name Item */
    .slot-item {
      height: var(--slot-height);
      line-height: var(--slot-height);
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 10px;
    }

    .slot-item.winner {
      color: var(--accent-color);
      text-shadow: 0 0 15px rgba(255, 165, 2, 0.8);
      animation: pulse 0.5s infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }

    /* Spin Button */
    .spin-btn {
      background: linear-gradient(to bottom, #ff6b81, #ff4757);
      border: none;
      border-radius: 50px;
      color: white;
      font-size: 1.5rem;
      font-weight: bold;
      padding: 15px 40px;
      cursor: pointer;
      margin-top: 25px;
      box-shadow: 0 5px 0 #b33939, 0 8px 15px rgba(0,0,0,0.4);
      transition: all 0.1s ease;
      width: 100%;
      letter-spacing: 1px;
    }

    .spin-btn:hover {
      background: linear-gradient(to bottom, #ff7f93, #ff5263);
    }

    .spin-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #b33939, 0 3px 10px rgba(0,0,0,0.4);
    }

    .spin-btn:disabled {
      background: #57606f;
      box-shadow: none;
      cursor: not-allowed;
      transform: translateY(4px);
    }

    /* Input/Settings Panel */
    .settings-panel {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      margin-top: 10px;
    }

    .settings-panel summary {
      cursor: pointer;
      font-weight: 600;
      color: #a4b0be;
      outline: none;
      user-select: none;
    }

    .settings-panel summary:hover {
      color: #fff;
    }

    textarea {
      width: 100%;
      height: 150px;
      background-color: #1e222b;
      border: 2px solid #57606f;
      border-radius: 8px;
      color: #fff;
      padding: 10px;
      margin-top: 15px;
      resize: vertical;
      font-size: 1rem;
    }

    textarea:focus {
      border-color: var(--accent-color);
      outline: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>NAME ROULETTE</h1>

  <div class="slot-machine">
    <div class="slot-viewport">
      <div class="slot-reel" id="slotReel">
        <div class="slot-item">READY?</div>
      </div>
    </div>
    
    <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN!</button>
  </div>

  <details class="settings-panel">
    <summary>Edit Names List</summary>
    <textarea id="namesInput" placeholder="Enter names, one per line...">Kelsey
Sean
Indrayani
Francis
David
Coleman
Pierce
Ramesh
Philip
Justin
Chloe
Roman
Tai
Isabel
Monica
Hannah
Aya
Jake
Jing Wen
Mark
Raciel
Ella
Kenneth
Jaquelyn
Sammy
JohnJack
Danny
Laura
Cameron
JohnPaul
Valerie
Alex
Ananya</textarea>
  </details>
</div>

<script>
  const slotReel = document.getElementById('slotReel');
  const spinBtn = document.getElementById('spinBtn');
  const namesInput = document.getElementById('namesInput');
  const itemHeight = 90; // Must match --slot-height in CSS

  function getNames() {
    return namesInput.value
      .split('\n')
      .map(name => name.trim())
      .filter(name => name.length > 0);
  }

  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }

  function spin() {
    const names = getNames();
    
    if (names.length === 0) {
      alert("Please enter at least one name!");
      return;
    }

    // Disable button during spin sequence
    spinBtn.disabled = true;

    // Reset reel layout and clear structural artifacts from previous spin
    slotReel.style.transition = 'none';
    slotReel.style.transform = 'translateY(0)';
    
    // Force a reflow so browser registers the reset
    slotReel.offsetHeight; 

    // Build an elongated spinning reel mix for visual illusion
    // We shuffle a few blocks to make the scroll look perfectly organic
    const block1 = shuffle([...names]);
    const block2 = shuffle([...names]);
    const block3 = shuffle([...names]);
    const finalWinnerIndex = Math.floor(Math.random() * names.length);
    const targetWinner = names[finalWinnerIndex];

    // Assemble dynamic reel array
    // Structure: [Initial View Item] -> [Random padding sequences] -> [Target Segment]
    const reelItems = ['🎰 SPINNING 🎰', ...block1, ...block2, ...block3];
    
    // Inject target winner uniquely toward the tail end of the strip
    const winnerPositionInReel = reelItems.length;
    reelItems.push(targetWinner);
    
    // Add 2 padding elements below winner so it frames beautifully in center
    reelItems.push(...shuffle([...names]).slice(0, 2));

    // Populate DOM elements
    slotReel.innerHTML = reelItems
      .map(name => `<div class="slot-item">${name}</div>`)
      .join('');

    // Configure ease-out transition to simulate momentum loss
    const transitionDuration = 3.5; // seconds
    slotReel.style.transition = `transform ${transitionDuration}s cubic-bezier(0.15, 0.85, 0.35, 1)`;
    
    // Calculate precise translateY displacement physics
    const targetOffset = winnerPositionInReel * itemHeight;
    slotReel.style.transform = `translateY(-${targetOffset}px)`;

    // Handle spin completion sequence
    setTimeout(() => {
      const items = slotReel.querySelectorAll('.slot-item');
      const winnerElement = items[winnerPositionInReel];
      if (winnerElement) {
        winnerElement.classList.add('winner');
      }
      spinBtn.disabled = false;
    }, transitionDuration * 1000);
  }
</script>

</body>
</html>
